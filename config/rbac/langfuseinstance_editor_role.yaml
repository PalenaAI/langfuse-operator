# This rule is not used by the project langfuse-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the langfuse.bitkaio.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: langfuse-operator
    app.kubernetes.io/managed-by: kustomize
  name: langfuseinstance-editor-role
rules:
- apiGroups:
  - langfuse.bitkaio.com
  resources:
  - langfuseinstances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - langfuse.bitkaio.com
  resources:
  - langfuseinstances/status
  verbs:
  - get
