# This rule is not used by the project langfuse-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to langfuse.bitkaio.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: langfuse-operator
    app.kubernetes.io/managed-by: kustomize
  name: langfuseinstance-viewer-role
rules:
- apiGroups:
  - langfuse.bitkaio.com
  resources:
  - langfuseinstances
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - langfuse.bitkaio.com
  resources:
  - langfuseinstances/status
  verbs:
  - get
