# This rule is not used by the project langfuse-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over langfuse.bitkaio.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: langfuse-operator
    app.kubernetes.io/managed-by: kustomize
  name: langfuseproject-admin-role
rules:
- apiGroups:
  - langfuse.bitkaio.com
  resources:
  - langfuseprojects
  verbs:
  - '*'
- apiGroups:
  - langfuse.bitkaio.com
  resources:
  - langfuseprojects/status
  verbs:
  - get
