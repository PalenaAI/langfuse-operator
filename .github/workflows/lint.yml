name: Lint

on:
  push:
  pull_request:

# Least privilege: this workflow only checks out and lints the code.
permissions:
  contents: read

jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          # Must be a release built with the same (or newer) Go toolchain
          # as go.mod declares — bump in lockstep with go.mod's `go` directive.
          version: v2.12.2
