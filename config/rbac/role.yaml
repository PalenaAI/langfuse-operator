---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - langfuse.bitkaio.com
  resources:
  - langfuseinstances
  - langfuseorganizations
  - langfuseprojects
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - langfuse.bitkaio.com
  resources:
  - langfuseinstances/finalizers
  - langfuseorganizations/finalizers
  - langfuseprojects/finalizers
  verbs:
  - update
- apiGroups:
  - langfuse.bitkaio.com
  resources:
  - langfuseinstances/status
  - langfuseorganizations/status
  - langfuseprojects/status
  verbs:
  - get
  - patch
  - update
