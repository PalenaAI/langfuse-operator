apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: '[]'
    capabilities: Deep Insights
    categories: AI/Machine Learning, Monitoring
    containerImage: ghcr.io/palenaai/langfuse-operator:v0.5.0
    description: Kubernetes operator for deploying and managing production-ready Langfuse
      LLM observability instances.
    repository: https://github.com/PalenaAI/langfuse-operator
    support: bitkaio LLC
  name: langfuse-operator.v0.5.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: LangfuseInstance is the Schema for the langfuseinstances API.
      displayName: Langfuse Instance
      kind: LangfuseInstance
      name: langfuseinstances.langfuse.palena.ai
      version: v1alpha1
    - description: LangfuseOrganization is the Schema for the langfuseorganizations
        API.
      displayName: Langfuse Organization
      kind: LangfuseOrganization
      name: langfuseorganizations.langfuse.palena.ai
      version: v1alpha1
    - description: LangfuseProject is the Schema for the langfuseprojects API.
      displayName: Langfuse Project
      kind: LangfuseProject
      name: langfuseprojects.langfuse.palena.ai
      version: v1alpha1
  description: |
    The Langfuse Operator deploys and manages production-ready [Langfuse](https://langfuse.com)
    instances on Kubernetes. Langfuse is an open-source LLM observability platform for tracing,
    evaluating, and monitoring AI applications.

    ### Features
    - Full stack deployment (Web, Worker, PostgreSQL, ClickHouse, Redis, Blob Storage) from a single CR
    - Automated zero-downtime upgrades with database migration orchestration
    - Secret auto-generation and rotation with rolling restarts
    - Multi-tenancy via LangfuseOrganization and LangfuseProject CRDs
    - Circuit breakers for dependency failure handling
    - ClickHouse data retention and schema drift detection
    - Prometheus metrics and OpenTelemetry integration
    - Support for Kubernetes, OpenShift, EKS, GKE, and AKS

    ### Prerequisites
    - Kubernetes v1.26+
    - (Optional) External PostgreSQL and ClickHouse if not using the built-in deployments
    - (Optional) S3-compatible blob storage for trace attachments
  displayName: Langfuse Operator
  icon:
  - base64data: ""
    mediatype: image/svg+xml
  install:
    spec:
      deployments: []
    strategy: deployment
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: true
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - langfuse
  - llm
  - observability
  - tracing
  - ai
  - machine-learning
  links:
  - name: Langfuse
    url: https://langfuse.com
  - name: Documentation
    url: https://github.com/PalenaAI/langfuse-operator
  maintainers:
  - email: team@bitkaio.com
    name: bitkaio LLC
  maturity: alpha
  minKubeVersion: 1.26.0
  provider:
    name: bitkaio LLC
    url: https://palena.ai
  version: 0.5.0
