---
# PostgreSQL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: langfuse-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              value: langfuse
            - name: POSTGRES_PASSWORD
              value: langfuse
            - name: POSTGRES_DB
              value: langfuse
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "langfuse"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: langfuse-e2e
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# ClickHouse
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: langfuse-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24
          env:
            - name: CLICKHOUSE_USER
              value: langfuse
            - name: CLICKHOUSE_PASSWORD
              value: langfuse
            - name: CLICKHOUSE_DB
              value: langfuse
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: langfuse-e2e
spec:
  selector:
    app: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
---
# MinIO (S3-compatible blob storage)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: langfuse-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: minioadmin
            - name: MINIO_ROOT_PASSWORD
              value: minioadmin
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: langfuse-e2e
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: langfuse-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          args: ["--requirepass", "langfuse"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "langfuse", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: langfuse-e2e
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
# MinIO bucket creation Job — Langfuse validates LANGFUSE_S3_EVENT_UPLOAD_BUCKET at startup.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: langfuse-e2e
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command: ["sh", "-c", "until wget -qO- http://minio:9000/minio/health/ready; do sleep 2; done"]
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              mc alias set local http://minio:9000 minioadmin minioadmin &&
              mc mb --ignore-existing local/langfuse
